<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            background-color: #f9f9f9;
            margin: 0;
            padding: 20px;
        }
        .spinner {
            border: 4px solid #rgba(0,0,0,0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #09f;
            animation: spin 1s ease infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="spinner" id="spinner"></div>
    <h2 id="message">Looking for the app...</h2>

    <script>
        window.onload = function() {
            // 1. Get the query parameters
            const urlParams = new URLSearchParams(window.location.search);
            const lectureId = urlParams.get('id');

            // --- CONFIGURE YOUR LINKS HERE ---
            // Where should they go if they DO NOT have the app? (e.g., your website or App Store)
            const fallbackWebPageUrl = "https://yourwebsite.com/download-or-listen"; 
            // ---------------------------------

            if (lectureId) {
                const appUrl = "prabhupadavani://lecture?id=" + lectureId;
                
                // 2. Try to redirect to the app
                window.location.replace(appUrl);

                // 3. Set a timer. If they are still on this webpage after 2.5 seconds, 
                // it means the app didn't open, so we send them to the fallback page.
                let fallbackTimer = setTimeout(function() {
                    // Check if the webpage is still visible. If the app opened, the page usually becomes hidden.
                    if (!document.hidden) {
                        document.getElementById('message').innerText = "App not found. Redirecting...";
                        window.location.replace(fallbackWebPageUrl);
                    }
                }, 2500);

                // 4. If the app successfully opens, the browser goes to the background.
                // We clear the timer so they don't get redirected to the store in the background.
                window.addEventListener('visibilitychange', function() {
                    if (document.hidden) {
                        clearTimeout(fallbackTimer);
                    }
                });
                
            } else {
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('message').innerText = "Invalid lecture link. No ID provided.";
            }
        };
    </script>
</body>
</html>
